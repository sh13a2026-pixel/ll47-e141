# GitHub Actions: tự động build APK khi push code
# Push project lên GitHub → vào tab Actions → tải APK từ "Artifacts"
# KHÔNG cần cài gì trên máy

name: Build APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.x'
          channel: stable

      - name: Install Flet
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build APK
        run: flet build apk --project ll47_e141 --org vn.mil.e141

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ll47-e141-apk
          path: build/apk/*.apk
          retention-days: 30
